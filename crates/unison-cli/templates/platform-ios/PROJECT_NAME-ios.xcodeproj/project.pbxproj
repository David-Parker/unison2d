			inputPaths = (
			);
			name = "Build Rust Game Engine";
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "# Build Rust {{PROJECT_NAME}} for iOS\nset -e\n\n# Source cargo environment (supports both rustup and Homebrew installations)\nif [ -f \"$HOME/.cargo/env\" ]; then\n    source \"$HOME/.cargo/env\"\nfi\n\n# Also check Homebrew path and common Node.js locations\nexport PATH=\"/opt/homebrew/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:/usr/local/bin:$PATH\"\n\n# SRCROOT is platform/ios/, project root is two levels up\nPROJECT_ROOT=\"$SRCROOT/../..\"\ncd \"$PROJECT_ROOT\"\n\n# Transpile TypeScript to Lua (must run before cargo embeds assets)\nif command -v npx &> /dev/null; then\n    npx tstl -p project/scripts-src/tsconfig.json\nelse\n    echo \"warning: npx not found — skipping TypeScript transpilation\"\nfi\n\n# Detect target: device vs simulator\nif [ \"$PLATFORM_NAME\" = \"iphonesimulator\" ]; then\n    RUST_TARGET=\"aarch64-apple-ios-sim\"\nelse\n    RUST_TARGET=\"aarch64-apple-ios\"\nfi\n\n# Use debug for Debug builds, release for Release\nif [ \"$CONFIGURATION\" = \"Debug\" ]; then\n    RUST_PROFILE=\"debug\"\n    CARGO_FLAGS=\"\"\nelse\n    RUST_PROFILE=\"release\"\n    CARGO_FLAGS=\"--release\"\nfi\n\ncargo build --target \"$RUST_TARGET\" --features ios,profiling --no-default-features $CARGO_FLAGS\n\n# Copy the static library to where Xcode can find it\nRUST_LIB=\"$PROJECT_ROOT/target/$RUST_TARGET/$RUST_PROFILE/lib{{CRATE_NAME}}.a\"\nmkdir -p \"$SRCROOT/libs\"\ncp \"$RUST_LIB\" \"$SRCROOT/libs/lib{{CRATE_NAME}}.a\"\n";
		};
/* End PBXShellScriptBuildPhase section */

