[workspace]
resolver = "2"
members = [
    "crates/unison2d",
    "crates/unison-math",
    "crates/unison-physics",
    "crates/unison-render",
    "crates/unison-lighting",
    "crates/unison-profiler",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/David-Parker/unison2d"

[workspace.dependencies]
# Internal crates
unison2d = { path = "crates/unison2d" }
unison-math = { path = "crates/unison-math" }
unison-physics = { path = "crates/unison-physics" }
unison-render = { path = "crates/unison-render" }
unison-lighting = { path = "crates/unison-lighting" }
unison-profiler = { path = "crates/unison-profiler" }

# External dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ron = "0.8"
